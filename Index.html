<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SFA30 Formaldehyde Monitor Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
        }

        .stat-card.alert::before {
            background: linear-gradient(90deg, #f093fb, #f5576c);
        }

        .stat-label {
            font-size: 12px;
            text-transform: uppercase;
            color: #999;
            margin-bottom: 8px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: #333;
            margin-bottom: 5px;
        }

        .stat-unit {
            font-size: 14px;
            color: #666;
        }

        .stat-card.alert .stat-value {
            color: #f5576c;
        }

        .chart-container {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .chart-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
        }

        .controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        select, button {
            padding: 10px 20px;
            border: 2px solid #667eea;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        select {
            background: white;
            color: #333;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
        }

        button:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .status {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        .status.safe {
            background: #d4edda;
            color: #155724;
        }

        .status.warning {
            background: #fff3cd;
            color: #856404;
        }

        .status.danger {
            background: #f8d7da;
            color: #721c24;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 18px;
        }

        .timestamp {
            font-size: 12px;
            color: #999;
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }

            .stat-value {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>SFA30 Formaldehyde Monitor</h1>
            <p class="subtitle">Real-time air quality monitoring dashboard</p>
            <p class="timestamp" id="lastUpdate">Last updated: Never</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card" id="hchoCard">
                <div class="stat-label">Formaldehyde</div>
                <div class="stat-value" id="hchoValue">--</div>
                <div class="stat-unit">ppb</div>
                <div class="status safe" id="hchoStatus">Initializing...</div>
            </div>

            <div class="stat-card">
                <div class="stat-label">Humidity</div>
                <div class="stat-value" id="humidityValue">--</div>
                <div class="stat-unit">%RH</div>
            </div>

            <div class="stat-card">
                <div class="stat-label">Temperature</div>
                <div class="stat-value" id="tempValue">--</div>
                <div class="stat-unit">°C</div>
            </div>

            <div class="stat-card">
                <div class="stat-label">Data Points</div>
                <div class="stat-value" id="dataCount">--</div>
                <div class="stat-unit">readings</div>
            </div>
        </div>

        <div class="chart-container">
            <div class="chart-title">Formaldehyde Levels Over Time</div>
            <div class="controls">
                <select id="timeRange">
                    <option value="1">Last 1 Hour</option>
                    <option value="6">Last 6 Hours</option>
                    <option value="24" selected>Last 24 Hours</option>
                    <option value="168">Last 7 Days</option>
                </select>
                <button onclick="refreshData()">Refresh</button>
                <button onclick="toggleAutoRefresh()">Auto-refresh: <span id="autoRefreshStatus">ON</span></button>
            </div>
            <canvas id="hchoChart"></canvas>
        </div>

        <div class="chart-container">
            <div class="chart-title">Temperature & Humidity</div>
            <canvas id="envChart"></canvas>
        </div>
    </div>

    <script>
        const API_URL = 'https://qt7ht3kf2wfa3xlrftafsmxs2a0qflkf.lambda-url.us-east-2.on.aws/';
        const THRESHOLD = 400;
        const REFRESH_INTERVAL = 30000;

        let hchoChart, envChart;
        let autoRefresh = true;
        let refreshTimer;

        function initCharts() {
            const hchoCtx = document.getElementById('hchoChart').getContext('2d');
            hchoChart = new Chart(hchoCtx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Formaldehyde (ppb)',
                        data: [],
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        borderWidth: 3,
                        tension: 0.4,
                        fill: true
                    }, {
                        label: 'Threshold (400 ppb)',
                        data: [],
                        borderColor: '#f5576c',
                        borderWidth: 2,
                        borderDash: [5, 5],
                        pointRadius: 0,
                        fill: false
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    aspectRatio: 2.5,
                    plugins: { legend: { display: true, position: 'top' } },
                    scales: {
                        y: { beginAtZero: true, title: { display: true, text: 'Formaldehyde (ppb)' } },
                        x: { title: { display: true, text: 'Time' } }
                    }
                }
            });

            const envCtx = document.getElementById('envChart').getContext('2d');
            envChart = new Chart(envCtx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Temperature (°C)',
                        data: [],
                        borderColor: '#f093fb',
                        backgroundColor: 'rgba(240, 147, 251, 0.1)',
                        borderWidth: 3,
                        tension: 0.4,
                        yAxisID: 'y',
                        fill: true
                    }, {
                        label: 'Humidity (%RH)',
                        data: [],
                        borderColor: '#4facfe',
                        backgroundColor: 'rgba(79, 172, 254, 0.1)',
                        borderWidth: 3,
                        tension: 0.4,
                        yAxisID: 'y1',
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    aspectRatio: 2.5,
                    plugins: { legend: { display: true, position: 'top' } },
                    scales: {
                        y: { type: 'linear', position: 'left', title: { display: true, text: 'Temperature (°C)' } },
                        y1: { type: 'linear', position: 'right', title: { display: true, text: 'Humidity (%RH)' }, grid: { drawOnChartArea: false } },
                        x: { title: { display: true, text: 'Time' } }
                    }
                }
            });
        }

        function parseTimestamp(timestamp) {
            if (!timestamp) return new Date(0);
            if (typeof timestamp === 'number') {
                return timestamp < 10000000000 ? new Date(timestamp * 1000) : new Date(timestamp);
            }
            return new Date(timestamp);
        }

        async function fetchData() {
            const hours = document.getElementById('timeRange').value;

            try {
                const response = await fetch(`${API_URL}?hours=${hours}&_=${Date.now()}`);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const result = await response.json();

                if (result.data && result.data.length > 0) {
                    // Sort data by timestamp ascending (oldest first, newest last)
                    const sortedData = result.data.slice().sort((a, b) => {
                        return parseTimestamp(a.timestamp) - parseTimestamp(b.timestamp);
                    });
                    updateDashboard(sortedData);
                    document.getElementById('lastUpdate').style.color = '#999';
                } else {
                    document.getElementById('lastUpdate').textContent = `No data returned - ${new Date().toLocaleTimeString()}`;
                    document.getElementById('lastUpdate').style.color = '#e74c3c';
                }
            } catch (error) {
                console.error('Error fetching data:', error);
                document.getElementById('lastUpdate').textContent = `Fetch error: ${error.message} - ${new Date().toLocaleTimeString()}`;
                document.getElementById('lastUpdate').style.color = '#e74c3c';
            }
        }

        function updateDashboard(data) {
            // Latest reading is now guaranteed to be the last item after sorting
            const latest = data[data.length - 1];

            document.getElementById('hchoValue').textContent = latest.formaldehyde_ppb.toFixed(1);
            document.getElementById('humidityValue').textContent = latest.humidity_rh.toFixed(1);
            document.getElementById('tempValue').textContent = latest.temperature_c.toFixed(1);
            document.getElementById('dataCount').textContent = data.length;

            const hchoCard = document.getElementById('hchoCard');
            const hchoStatus = document.getElementById('hchoStatus');

            if (latest.formaldehyde_ppb > THRESHOLD) {
                hchoCard.classList.add('alert');
                hchoStatus.className = 'status danger';
                hchoStatus.textContent = 'Above Threshold';
            } else if (latest.formaldehyde_ppb > THRESHOLD * 0.75) {
                hchoCard.classList.remove('alert');
                hchoStatus.className = 'status warning';
                hchoStatus.textContent = 'Approaching Threshold';
            } else {
                hchoCard.classList.remove('alert');
                hchoStatus.className = 'status safe';
                hchoStatus.textContent = 'Safe Levels';
            }

            const latestTime = parseTimestamp(latest.timestamp);
            document.getElementById('lastUpdate').textContent = `Last reading: ${latestTime.toLocaleString()}`;

            updateCharts(data);
        }

        function updateCharts(data) {
            const hours = parseInt(document.getElementById('timeRange').value);

            const labels = data.map(d => {
                const date = parseTimestamp(d.timestamp);
                if (hours > 24) {
                    return date.toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                }
                return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            });

            const hchoData = data.map(d => d.formaldehyde_ppb);
            const thresholdData = data.map(() => THRESHOLD);
            const tempData = data.map(d => d.temperature_c);
            const humidityData = data.map(d => d.humidity_rh);

            hchoChart.data.labels = labels;
            hchoChart.data.datasets[0].data = hchoData;
            hchoChart.data.datasets[1].data = thresholdData;
            hchoChart.update();

            envChart.data.labels = labels;
            envChart.data.datasets[0].data = tempData;
            envChart.data.datasets[1].data = humidityData;
            envChart.update();
        }

        function refreshData() {
            fetchData();
        }

        function toggleAutoRefresh() {
            autoRefresh = !autoRefresh;
            document.getElementById('autoRefreshStatus').textContent = autoRefresh ? 'ON' : 'OFF';

            if (autoRefresh) {
                startAutoRefresh();
            } else {
                clearInterval(refreshTimer);
            }
        }

        function startAutoRefresh() {
            refreshTimer = setInterval(fetchData, REFRESH_INTERVAL);
        }

        document.getElementById('timeRange').addEventListener('change', fetchData);

        window.onload = function() {
            initCharts();
            fetchData();
            startAutoRefresh();
        };
    </script>
</body>
</html>
